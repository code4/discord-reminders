name: Keep Alive

on:
  schedule:
    # Runs once a day at 06:00 UTC to keep the repo active
    # This prevents GitHub from disabling the reminder scheduler cron
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Keep scheduler alive
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git commit --allow-empty -m "chore: keep scheduler alive [skip ci]"
          git push
