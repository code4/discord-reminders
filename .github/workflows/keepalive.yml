name: Keep Alive

on:
  schedule:
    # Runs once a day at 06:00 UTC to keep the repo active
    # This prevents GitHub from disabling the reminder scheduler cron
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Keep scheduler alive
        run: |
          git config user.email "keepalive@github-actions"
          git config user.name "GitHub Actions"
          git commit --allow-empty -m "chore: keep scheduler alive [skip ci]"
          git push
